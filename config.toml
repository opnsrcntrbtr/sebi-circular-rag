# SEBI Circular RAG service configuration.
# Any field can be overridden by an env var SEBI_RAG_<FIELD> (uppercased).
# Secrets are NOT here: set SEBI_RAG_API_KEY in the environment.

[service]
generator = "mlx"                                      # mlx | ollama
mlx_model = "mlx-community/Qwen2.5-1.5B-Instruct-4bit" # 3B for higher groundedness
top_k = 3                                              # calibrated (citation prec 0.97 / recall 1.0)
abstain_threshold = 0.05                               # far-domain score floor; near-domain
                                                       # abstention = subject-sim gate (SEBI_RAG_GATE)
superseded_penalty = 0.3                               # demote superseded chunks in rerank
rate_per_min = 60                                      # per key/IP
timeout_s = 30                                         # /query budget -> 504
# corpus_path and index_dir default to data/corpus/circulars.jsonl and data/index

# Hugging Face Spaces demo (CPU-only). Read ONLY by Settings.load_spaces();
# the Apple-Silicon local stack above is unaffected. Env prefix: SEBI_RAG_SPACES_.
[spaces]
dataset_repo       = "opnsrcntrbtrian/sebi-circulars"  # HF dataset: corpus source
index_repo         = "opnsrcntrbtrian/sebi-circulars-index"  # HF dataset repo with prebuilt data/index
default_config     = "chunks"                          # "chunks" | "corpus"
default_subset     = "full"                            # "full" | "recent"
recent_years       = [2025, 2026]
external_space     = "huggingface-projects/llama-2-7b-chat"  # official HF org Space, Llama-2-7B-Chat (live-verified 2026-07-10, ~7s latency)
external_api_name  = "/generate"
external_timeout_s = 30.0                              # live-tested 2026-07-10: queue time on this
                                                       # shared public Space ranged 7-23s; 20s caused
                                                       # avoidable fallbacks
hf_model           = "Qwen/Qwen2.5-0.5B-Instruct"      # CPU fallback generator (same family as local MLX model)
max_tokens         = 200                               # matches MLXGenerator default; CPU-latency bound
temperature        = 0.2
top_p              = 0.9
top_k              = 3
timeout_s          = 60.0
abstain_threshold  = 0.05                              # copied from [service]
superseded_penalty = 0.3                               # copied from [service]
